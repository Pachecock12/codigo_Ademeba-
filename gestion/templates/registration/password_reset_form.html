<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña | ADEMEBA OAXACA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body, html { height: 100%; margin: 0; font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
        .container-center { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .recovery-box {
            background: #111;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 2.5rem;
            border-radius: 20px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
        .brand-logo { font-size: 2rem; font-weight: 900; color: #fff; letter-spacing: -2px; text-align: center; margin-bottom: 2rem; }
        .brand-logo span { color: #dca311; }
        .form-control {
            background: #1a1f22; border: 1px solid #2d3436; color: #fff;
            padding: 0.8rem 1.2rem; border-radius: 12px; margin-bottom: 1rem;
        }
        .form-control:focus { background: #202629; border-color: #dca311; color: #fff; box-shadow: none; }
        .btn-elite {
            background: #dca311; color: #000; font-weight: 800; padding: 1rem;
            border-radius: 12px; width: 100%; border: none; text-transform: uppercase;
            letter-spacing: 1px; margin-top: 1rem;
        }
        .btn-elite:hover { background: #f0b418; color: #000; }
        .text-gold { color: #dca311; }
    </style>
</head>
<body>
    <div class="container-center">
        <div class="recovery-box">
            <div class="brand-logo">ADEMEBA<span>.</span>OAX</div>
            <h4 class="fw-bold mb-1">¿Olvidaste tu contraseña?</h4>
            <p class="text-white-50 small mb-4">Ingresa tu correo electrónico y te enviaremos las instrucciones para restablecerla.</p>

            <form method="post">
                {% csrf_token %}
                <label class="text-white-50 small fw-bold mb-2">Correo Electrónico</label>
                <input type="email" name="email" class="form-control" placeholder="correo@ejemplo.com" required autofocus>
                {% if form.email.errors %}
                    {% for error in form.email.errors %}
                        <div class="text-danger small mb-2">{{ error }}</div>
                    {% endfor %}
                {% endif %}
                <button type="submit" class="btn-elite">Enviar Instrucciones</button>
            </form>

            <div class="text-center mt-3">
                <a href="{% url 'login' %}" class="text-gold text-decoration-none small fw-bold">Volver al inicio de sesión</a>
            </div>
        </div>
    </div>
</body>
</html>
