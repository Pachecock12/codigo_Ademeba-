<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Correo Enviado | ADEMEBA OAXACA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body, html { height: 100%; margin: 0; font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
        .container-center { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .recovery-box {
            background: #111;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 2.5rem;
            border-radius: 20px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            text-align: center;
        }
        .brand-logo { font-size: 2rem; font-weight: 900; color: #fff; letter-spacing: -2px; margin-bottom: 2rem; }
        .brand-logo span { color: #dca311; }
        .icon-success { font-size: 4rem; color: #28a745; margin-bottom: 1rem; }
        .text-gold { color: #dca311; }
    </style>
</head>
<body>
    <div class="container-center">
        <div class="recovery-box">
            <div class="brand-logo">ADEMEBA<span>.</span>OAX</div>
            <div class="icon-success"><i class="bi bi-envelope-check-fill"></i></div>
            <h4 class="fw-bold mb-3">Revisa tu correo</h4>
            <p class="text-white-50 mb-4">
                Si existe una cuenta con el correo que ingresaste, recibirás un enlace para restablecer tu contraseña en unos minutos.
            </p>
            <a href="{% url 'login' %}" class="text-gold text-decoration-none fw-bold">Volver al inicio de sesión</a>
        </div>
    </div>
</body>
</html>
